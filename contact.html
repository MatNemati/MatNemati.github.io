<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact | Matin Nemati</title>

<style>
  :root{
    /* dynamic vars for micro-glow */
    --gx: 50vw;              /* dot x (updated by JS) */
    --gy: 40vh;              /* dot y (updated by JS) */
    --dot: 240px;            /* dot radius - small & localized */
    --glow-alpha: .12;       /* base strength */

    /* theme */
    --bg-1:#0e0e0e;
    --bg-2:#0b0b0b;
    --fg:#f1f1f1;
    --muted:#cccccc;
    --accent:#00bfff;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color:var(--fg); line-height:1.7; background:var(--bg-1);
    overflow-x:hidden;
  }

  /* === Background layers (identical to index) === */
  .interactive-bg{
    position:fixed; inset:0; z-index:-3;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
  }
  .neurons{
    position:fixed; inset:0; z-index:-2; pointer-events:none; opacity:.08; mix-blend-mode:screen;
  }
  .bg-brain{
    position:fixed; z-index:-1; pointer-events:none; user-select:none;
    right:-8vw; top:12vh; width:min(52vw, 900px); min-width:320px;
    opacity:.10; mix-blend-mode:screen;
    filter: saturate(1.05) contrast(1.05) drop-shadow(0 0 16px rgba(0,191,255,.08));
  }
  .micro-glow{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(var(--dot) var(--dot) at var(--gx) var(--gy),
        rgba(0,191,255,var(--glow-alpha)),
        rgba(139,92,246,calc(var(--glow-alpha)*.7)) 45%,
        transparent 75%);
    filter:saturate(112%) contrast(104%);
    transition: opacity .25s ease;
  }

  /* === Top navbar (identical to index with chevron fix) === */
  .topbar{
    position:sticky; top:0; z-index:10;
    backdrop-filter: blur(10px) saturate(140%);
    background: rgba(10,10,10,.6);
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .topbar .wrap{
    position:relative;
    max-width:820px; margin:0 auto; padding:10px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .brand{font-weight:700}
  nav{
    position:relative; flex:1;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    white-space:nowrap; scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none}
  .wrap::before, .wrap::after{
    content:""; position:absolute; top:0; bottom:0; width:32px; pointer-events:none;
  }
  .wrap::before{ left:0; background:linear-gradient(90deg, rgba(14,14,14,1), rgba(14,14,14,0)); }
  .wrap::after{ right:0; background:linear-gradient(270deg, rgba(14,14,14,1), rgba(14,14,14,0)); }
  .scroll-hint{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    font-weight:800; opacity:.6; user-select:none; pointer-events:none;
  }
  nav a{
    display:inline-block; color:var(--fg); text-decoration:none; font-weight:600;
    padding:8px 10px; border-radius:10px; opacity:.9; margin:0 2px;
  }
  nav a:hover{opacity:1; background:rgba(255,255,255,.06)}

  /* === Shared content spacing (same container/card as index) === */
  header{ padding:44px 20px 6px; text-align:center; }
  .avatar{
    width:112px; height:112px; border-radius:50%; object-fit:cover; margin-bottom:10px;
    box-shadow:0 0 10px rgba(255,255,255,.05);
  }
  header h1{ font-size:2.5rem; margin-bottom:.3em; }
  header h2{ font-weight:400; font-size:1.1rem; color:#ccc; margin-bottom:.5em; }
  .email-link{ display:inline-block; font-size:.95rem; color:var(--accent); text-decoration:none; margin-bottom:1em; }
  .email-link:hover{ text-decoration:underline; }

  .container{ max-width:750px; margin:0 auto; padding:10px 20px 20px; }
  .card{
    background:#1a1a1a; padding:24px; border-radius:16px;
    box-shadow:0 0 30px rgba(255,255,255,.05);
    transition: box-shadow .15s ease; text-align:center;
  }
  .card:hover{ box-shadow:0 0 40px rgba(255,255,255,.10); }

  a{ color:var(--accent); text-decoration:none; }
  a:hover{ text-decoration:underline; }

  .socials{ display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:16px 0 24px; }
  .socials a{
    background:#2a2a2a; padding:10px 16px; border-radius:8px; color:#fff;
    text-decoration:none; transition:background .25s ease;
  }
  .socials a:hover{ background:#444; }

  /* Contact form styling inside the same card */
  form{
    display:flex; flex-direction:column; gap:14px;
    text-align:left; max-width:520px; margin:0 auto;
  }
  label{display:flex; flex-direction:column; font-weight:600; color:#ddd;}
  input, textarea{
    background:#0e0e0e; color:#fff; border:1px solid rgba(255,255,255,.1);
    border-radius:8px; padding:10px 12px; font-size:1rem; font-family:inherit;
  }
  textarea{min-height:120px; resize:vertical;}
  button{
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:10px 16px; font-size:1rem; cursor:pointer; font-weight:600;
    transition:background .25s ease;
  }
  button:hover{ background:#0096cc; }
  .success-message{ margin-top:14px; color:#00bfff; font-weight:600; display:none; }

  /* Performance tweaks (smooth hover) */
  .micro-glow{ will-change: background; }
  .bg-brain{ will-change: filter; }
  .card, .socials a{ will-change: transform, box-shadow; transform: translateZ(0); }
  .card:hover, .socials a:hover{ transform: translateY(-1px); }

  @media (max-width: 880px){
    .bg-brain{ right:-14vw; top:16vh; width:68vw; opacity:.08; }
    :root{ --dot: 200px; }
  }
  @media (prefers-reduced-motion: reduce){
    .micro-glow{ transition:none; }
  }
</style>

<script>
/* Micro Glow Wander (same behavior as index; no mouse follow) */
(function(){
  const root = document.documentElement;
  const bounds = { xMin: 0.15, xMax: 0.85, yMin: 0.20, yMax: 0.75 };
  let gx = innerWidth * 0.5, gy = innerHeight * 0.4;
  let tx = gx, ty = gy; let alpha = 0.12; let t = 0; let raf = null;

  function pickTarget(){
    tx = innerWidth  * (bounds.xMin + Math.random()*(bounds.xMax-bounds.xMin));
    ty = innerHeight * (bounds.yMin + Math.random()*(bounds.yMax-bounds.yMin));
  }
  function apply(){
    root.style.setProperty('--gx', gx + 'px');
    root.style.setProperty('--gy', gy + 'px');
    root.style.setProperty('--glow-alpha', alpha.toFixed(3));
  }
  function loop(){
    gx += (tx - gx) * 0.015;
    gy += (ty - gy) * 0.015;
    t += 0.01; const breath = 0.9 + 0.2 * (0.5 + 0.5*Math.sin(t));
    alpha = 0.12 * breath;
    if (Math.hypot(tx-gx, ty-gy) < 8) pickTarget();
    apply(); raf = requestAnimationFrame(loop);
  }
  pickTarget(); apply(); raf = requestAnimationFrame(loop);
  addEventListener('resize', ()=>{ gx=Math.min(Math.max(gx,0),innerWidth); gy=Math.min(Math.max(gy,0),innerHeight); apply(); }, {passive:true});
})();
</script>
</head>

<body>
  <!-- Background layers -->
  <div class="interactive-bg" aria-hidden="true"></div>
  <svg class="neurons" viewBox="0 0 1200 800" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="wire" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#00bfff"/>
      </linearGradient>
    </defs>
    <g stroke="url(#wire)" stroke-width="1.2" fill="none">
      <path d="M50,700 C200,650 260,540 380,520 520,500 600,420 760,420 900,420 1020,500 1150,520"/>
      <path d="M80,120 C260,200 320,260 420,300 560,360 720,340 860,300 1000,260 1100,220 1180,180"/>
      <path d="M60,400 C240,380 340,360 480,380 640,410 740,500 900,540 1040,580 1120,620 1180,660"/>
    </g>
  </svg>
  <img class="bg-brain" src="brain.png" alt="" aria-hidden="true" />
  <div class="micro-glow" aria-hidden="true"></div>

  <!-- Topbar (unchanged layout) -->
  <div class="topbar">
    <div class="wrap">
      <div class="brand">MatNemati</div>
      <span class="scroll-hint">›</span>
      <nav aria-label="Main tabs">
        <a href="index.html">Home</a>
        <a href="academics.html">Academics & Certificates</a>
        <a href="research.html">Research & Projects</a>
        <a href="teaching.html">Teaching</a>
        <a href="experience.html">Experience</a>
        <a href="skills.html">Skills</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </div>

  <!-- Header (kept for consistent spacing) -->
  <header>
    <img src="IMG_20251001_131401.jpg" alt="Matin Nemati" class="avatar" />
    <h1>Contact Me</h1>
    <h2>If you'd like to reach out, use the links below or send me a message directly.</h2>
    <a class="email-link" href="mailto:MatNemati@gmail.com">MatNemati@gmail.com</a>
  </header>

  <!-- Main container + single centered card (same as index) -->
  <div class="container">
    <div class="card">
      <!-- Social links (same style as index socials) -->
      <div class="socials">
        <a href="https://github.com/MatNemati" target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/MatNemati" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://x.com/MatNemati" target="_blank" rel="noopener">X (Twitter)</a>

        <a href="https://instagram.com/MatNemati" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.researchgate.net/profile/Matin-Nemati" target="_blank" rel="noopener">ResearchGate</a>
      </div>

      <!-- Contact form (Formspree) -->
      <form action="https://formspree.io/f/xgvnldpo" method="POST">
        <label>
          Name (optional)
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Contact Info (optional)
          <input type="text" name="contact" placeholder="Email, Telegram, etc.">
        </label>
        <label>
          Message
          <textarea name="message" required placeholder="Write your message here..."></textarea>
        </label>
        <!-- Extra meta (timestamp & user agent) -->
        <input type="hidden" name="timestamp" id="ts">
        <input type="hidden" name="userAgent" id="ua">
        <button type="submit">Send Message</button>
      </form>
      <div class="success-message">✅ Message sent successfully!</div>
    </div>
  </div>

<script>
/* Attach timestamp & UA before submit; show success message on 200 */
document.addEventListener("DOMContentLoaded", ()=>{
  const form = document.querySelector("form");
  const ts = document.getElementById("ts");
  const ua = document.getElementById("ua");
  const successMsg = document.querySelector(".success-message");

  // Fill meta fields
  const now = new Date();
  ts.value = now.toISOString();        // ISO timestamp
  ua.value = navigator.userAgent || ""; // browser/device info

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();
    // refresh timestamp on each submit
    ts.value = new Date().toISOString();

    const data = new FormData(form);
    const response = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: { 'Accept': 'application/json' }
    });
    if (response.ok){
      form.reset();
      successMsg.style.display = "block";
      setTimeout(()=>successMsg.style.display="none", 5000);
    } else {
      alert("Error sending message. Please try again.");
    }
  });
});
</script>
</body>
</html>
